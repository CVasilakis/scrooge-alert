name: Manual Draft Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag for this release (e.g., v1.1.0)'
        required: true
        type: string
      release_name:
        description: 'Title of the release (e.g., Spring Update)'
        required: true
        type: string

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version_tag }}
          name: "${{ inputs.version_tag }} - ${{ inputs.release_name }}"
          draft: true
          generate_release_notes: true
          body: |
            ## 🚀 Release Overview

            Briefly describe the purpose of this release. What are the major highlights?

            ## ✨ New Features
            * **Feature Name:** Brief description of the feature

            ## 🐛 Bug Fixes
            * TODO

            ## 🛠 Improvements & Refactoring
            * TODO

            ## ⚠️ Breaking Changes
            *(Remove this section if there are no breaking changes)*

            ## 💻 How to Upgrade

            If you are already using an older version of the project, to update to this version, go to the project's folder and execute the update script. Your monitored products (`data/products.json`) and the apprise notification URLs (`.env`) will stay intact.

            ```sh
            ./update.sh
            ```
